<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing gradient background -->
  <rect width="256" height="256" rx="60" fill="url(#paint0_linear)"/>
  
  <!-- Robot Icon (inspired by lucide 'Bot') -->
  <!-- Antenna -->
  <circle cx="128" cy="55" r="16" fill="white"/>
  <rect x="120" y="70" width="16" height="40" fill="white"/>
  
  <!-- Face -->
  <rect x="40" y="110" width="176" height="100" rx="20" stroke="white" stroke-width="16" fill="transparent"/>
  
  <!-- Eyes -->
  <circle cx="95" cy="160" r="16" fill="white"/>
  <circle cx="161" cy="160" r="16" fill="white"/>
  
  <!-- Ears -->
  <rect x="10" y="140" width="30" height="40" rx="8" fill="white"/>
  <rect x="216" y="140" width="30" height="40" rx="8" fill="white"/>
  
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
